<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Claude Export Viewer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #faf9f7;
    --panel: #ffffff;
    --border: #e6e3dd;
    --text: #2b2a26;
    --muted: #807a70;
    --accent: #c96442;
    --accent-soft: #f3e3dc;
    --human-bg: #f3efe7;
    --assistant-bg: #ffffff;
    --code-bg: #f5f2ec;
    --tool-bg: #faf6ee;
    --shadow: 0 1px 3px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text);
    background: var(--bg);
  }
  #app { display: flex; flex-direction: column; height: 100vh; }

  header.top {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header.top h1 {
    font-size: 15px;
    font-weight: 600;
    margin: 0;
    margin-right: auto;
    color: var(--accent);
  }
  header.top input[type="search"] {
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    background: var(--bg);
    width: 220px;
  }
  header.top input[type="search"]:focus {
    outline: none;
    border-color: var(--accent);
  }
  .file-btn {
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--panel);
    cursor: pointer;
    font-size: 13px;
  }
  .file-btn:hover { background: var(--accent-soft); border-color: var(--accent); }
  #status { color: var(--muted); font-size: 12px; }

  main {
    display: flex;
    flex: 1;
    min-height: 0;
  }
  aside.sidebar {
    width: 320px;
    border-right: 1px solid var(--border);
    background: var(--panel);
    overflow-y: auto;
    flex-shrink: 0;
  }
  .conv-item {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .conv-item:hover { background: var(--bg); }
  .conv-item.active { background: var(--accent-soft); border-left: 3px solid var(--accent); padding-left: 11px; }
  .conv-title {
    font-weight: 500;
    font-size: 13px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .conv-meta {
    color: var(--muted);
    font-size: 11px;
    margin-top: 2px;
  }

  section.messages {
    flex: 1;
    overflow-y: auto;
    padding: 0;
    min-width: 0;
  }
  .conv-header {
    position: sticky;
    top: 0;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .conv-header h2 {
    font-size: 16px;
    margin: 0;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .conv-info { color: var(--muted); font-size: 12px; }

  .msg-list { max-width: 820px; margin: 0 auto; padding: 16px 24px 60px; }
  .msg {
    margin-bottom: 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .msg-human { background: var(--human-bg); }
  .msg-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .msg-human .msg-header { background: rgba(0,0,0,0.02); }
  .sender { font-weight: 600; color: var(--text); }
  .msg-human .sender { color: var(--accent); }
  .ts { color: var(--muted); }
  .copy-btn {
    margin-left: auto;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--panel);
    cursor: pointer;
    font-size: 11px;
    color: var(--muted);
  }
  .copy-btn:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
  .copy-btn.copied { background: #d8efd8; color: #2a662a; border-color: #2a662a; }

  .msg-body { padding: 14px 16px; }
  .msg-body > *:first-child { margin-top: 0; }
  .msg-body > *:last-child { margin-bottom: 0; }
  .msg-body p { margin: 0 0 10px; }
  .msg-body h1, .msg-body h2, .msg-body h3 { margin: 16px 0 8px; font-weight: 600; }
  .msg-body h1 { font-size: 18px; }
  .msg-body h2 { font-size: 16px; }
  .msg-body h3 { font-size: 14px; }
  .msg-body ul, .msg-body ol { padding-left: 24px; margin: 8px 0; }
  .msg-body li { margin-bottom: 4px; }
  .msg-body code {
    background: var(--code-bg);
    padding: 1px 5px;
    border-radius: 3px;
    font: 12px/1.4 ui-monospace, "SF Mono", Menlo, monospace;
  }
  .msg-body pre {
    background: var(--code-bg);
    padding: 12px 14px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 10px 0;
  }
  .msg-body pre code {
    background: transparent;
    padding: 0;
    font-size: 12px;
  }
  .msg-body blockquote {
    margin: 8px 0;
    padding-left: 12px;
    border-left: 3px solid var(--border);
    color: var(--muted);
  }
  .msg-body a { color: var(--accent); }
  .msg-body table { border-collapse: collapse; margin: 10px 0; }
  .msg-body th, .msg-body td { border: 1px solid var(--border); padding: 4px 8px; }

  details.block {
    margin: 8px 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--tool-bg);
  }
  details.block > summary {
    padding: 6px 12px;
    cursor: pointer;
    font-size: 12px;
    color: var(--muted);
    user-select: none;
  }
  details.block[open] > summary {
    border-bottom: 1px solid var(--border);
  }
  details.block > .block-body {
    padding: 10px 14px;
  }
  details.block pre {
    margin: 0;
    background: transparent;
    padding: 0;
    font-size: 12px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  details.thinking { background: #f4f0fa; }
  details.tool-result.error { background: #fdecea; }

  /* Artifacts */
  .artifacts-panel {
    margin: 14px auto 0;
    max-width: 820px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .artifacts-panel > summary {
    padding: 10px 14px;
    cursor: pointer;
    font-weight: 500;
    background: linear-gradient(180deg, #fff, #fbf9f4);
    user-select: none;
    font-size: 13px;
  }
  .artifacts-panel[open] > summary { border-bottom: 1px solid var(--border); }
  .artifacts-list { padding: 4px 0; }
  .artifacts-list-item { padding: 0 14px; }
  .artifacts-list-item + .artifacts-list-item { border-top: 1px solid var(--border); }
  .art-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0;
    font-size: 13px;
  }
  .art-row .art-title {
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-weight: 500; min-width: 0;
  }
  .art-row .art-versions-count { color: var(--muted); font-size: 11px; }
  .art-row select, .art-row .art-toggle {
    padding: 3px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--panel);
    font-size: 11px;
    cursor: pointer;
    color: var(--muted);
  }
  .art-row .art-toggle:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
  .art-body { padding: 4px 0 12px; }

  .artifact-card {
    margin: 10px 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fdfcf8;
    overflow: hidden;
  }
  .artifact-card.artifact-update { background: #f9f6ef; }
  .artifact-card-header {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    background: rgba(0,0,0,0.02);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .artifact-icon { font-size: 14px; }
  .artifact-title {
    font-weight: 600;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
  }
  .artifact-type-badge {
    padding: 2px 7px;
    background: var(--accent-soft);
    color: var(--accent);
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }
  .artifact-cmd {
    color: var(--muted);
    font-size: 11px;
    text-transform: capitalize;
    flex-shrink: 0;
  }
  .artifact-card-header .copy-btn { margin-left: auto; flex-shrink: 0; }
  .artifact-tabs {
    display: flex; gap: 4px;
    padding: 6px 12px 0;
    background: rgba(0,0,0,0.02);
  }
  .art-tab {
    padding: 4px 12px;
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 4px 4px 0 0;
    background: var(--panel);
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
  }
  .art-tab.active { background: #fdfcf8; color: var(--text); }
  .artifact-html-frame {
    width: 100%; height: 480px;
    border: none;
    background: white;
    display: block;
    resize: vertical;
    overflow: auto;
  }
  .artifact-source {
    margin: 0;
    padding: 12px 14px;
    background: var(--code-bg);
    overflow: auto;
    max-height: 480px;
    font-size: 12px;
  }
  .artifact-source code { background: transparent; padding: 0; }
  .artifact-rendered-md { padding: 14px 16px; max-height: 480px; overflow-y: auto; }
  .artifact-svg-frame { padding: 16px; background: white; text-align: center; }
  .artifact-svg-frame img { max-width: 100%; max-height: 460px; }
  .artifact-diff {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
  }
  .diff-side { padding: 8px 12px; background: var(--panel); }
  .diff-old { background: #fdecea; }
  .diff-new { background: #ecf7ed; }
  .diff-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
    font-weight: 600;
  }
  .diff-side pre {
    margin: 0;
    background: transparent;
    padding: 0;
    font-size: 11px;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 280px;
    overflow-y: auto;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  @media (max-width: 700px) {
    .artifact-diff { grid-template-columns: 1fr; }
  }

  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    text-align: center;
    padding: 40px;
  }
  .empty h2 { color: var(--text); margin: 0 0 8px; font-weight: 600; }
  .empty p { margin: 4px 0; max-width: 420px; }
  .empty code { background: var(--code-bg); padding: 2px 6px; border-radius: 3px; }

  .drag-over { background: var(--accent-soft) !important; }
</style>
</head>
<body>
<div id="app">
  <header class="top">
    <h1>Claude Export Viewer</h1>
    <label class="file-btn">
      Open conversations.json
      <input type="file" id="filePicker" accept=".json,application/json" hidden>
    </label>
    <input type="search" id="searchBox" placeholder="Search conversations…" disabled>
    <span id="status">No file loaded</span>
  </header>
  <main>
    <aside class="sidebar" id="sidebar">
      <div class="empty" id="sidebarEmpty">
        <p>Drop <code>conversations.json</code> here<br>or click the button above.</p>
      </div>
    </aside>
    <section class="messages" id="messages">
      <div class="empty">
        <h2>Read-only viewer for your Claude export</h2>
        <p>Pick the <code>conversations.json</code> file from your <code>data-*/</code> export folder.</p>
        <p>Everything runs locally in your browser — nothing is uploaded.</p>
      </div>
    </section>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
'use strict';

let conversations = [];
let currentIdx = -1;

const filePicker = document.getElementById('filePicker');
const searchBox = document.getElementById('searchBox');
const sidebar = document.getElementById('sidebar');
const messagesEl = document.getElementById('messages');
const statusEl = document.getElementById('status');

if (window.marked) {
  marked.setOptions({ gfm: true, breaks: false });
}

filePicker.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) loadFile(file);
});

searchBox.addEventListener('input', renderSidebar);

['dragenter', 'dragover'].forEach(evt => {
  document.body.addEventListener(evt, (e) => {
    e.preventDefault();
    sidebar.classList.add('drag-over');
  });
});
['dragleave', 'drop'].forEach(evt => {
  document.body.addEventListener(evt, (e) => {
    e.preventDefault();
    if (evt === 'drop' || e.target === sidebar) sidebar.classList.remove('drag-over');
  });
});
document.body.addEventListener('drop', async (e) => {
  e.preventDefault();
  sidebar.classList.remove('drag-over');
  const items = e.dataTransfer.items;
  if (!items) return;
  // Look for conversations.json among dropped items / folder
  for (const item of items) {
    const entry = item.webkitGetAsEntry ? item.webkitGetAsEntry() : null;
    if (entry && entry.isDirectory) {
      const file = await findConversationsJson(entry);
      if (file) { loadFile(file); return; }
    } else if (item.kind === 'file') {
      const file = item.getAsFile();
      if (file && /conversations\.json$/i.test(file.name)) { loadFile(file); return; }
      if (file && /\.json$/i.test(file.name)) { loadFile(file); return; }
    }
  }
  statusEl.textContent = "Couldn't find conversations.json in dropped items";
});

function findConversationsJson(dirEntry) {
  return new Promise((resolve) => {
    const reader = dirEntry.createReader();
    reader.readEntries((entries) => {
      for (const e of entries) {
        if (e.isFile && /conversations\.json$/i.test(e.name)) {
          e.file(resolve);
          return;
        }
      }
      resolve(null);
    });
  });
}

async function loadFile(file) {
  statusEl.textContent = `Loading ${file.name} (${formatBytes(file.size)})…`;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!Array.isArray(data)) {
      throw new Error('Expected an array of conversations');
    }
    conversations = data;
    conversations.sort((a, b) => (b.updated_at || '').localeCompare(a.updated_at || ''));
    statusEl.textContent = `${conversations.length} conversations`;
    searchBox.disabled = false;
    currentIdx = -1;
    renderSidebar();
    renderMessages();
  } catch (err) {
    statusEl.textContent = 'Error: ' + err.message;
    console.error(err);
  }
}

function renderSidebar() {
  const q = searchBox.value.trim().toLowerCase();
  const filtered = q
    ? conversations.map((c, i) => ({ c, i }))
        .filter(({ c }) => (c.name || '').toLowerCase().includes(q))
    : conversations.map((c, i) => ({ c, i }));

  if (filtered.length === 0) {
    sidebar.innerHTML = `<div class="empty"><p>No conversations match.</p></div>`;
    return;
  }

  const frag = document.createDocumentFragment();
  for (const { c, i } of filtered) {
    const div = document.createElement('div');
    div.className = 'conv-item' + (i === currentIdx ? ' active' : '');
    div.dataset.idx = i;
    div.innerHTML = `
      <div class="conv-title"></div>
      <div class="conv-meta"></div>`;
    div.querySelector('.conv-title').textContent = c.name || '(untitled)';
    div.querySelector('.conv-meta').textContent =
      `${formatDate(c.updated_at)} · ${(c.chat_messages || []).length} msgs`;
    div.addEventListener('click', () => selectConv(i));
    frag.appendChild(div);
  }
  sidebar.innerHTML = '';
  sidebar.appendChild(frag);
}

function selectConv(idx) {
  currentIdx = idx;
  sidebar.querySelectorAll('.conv-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.idx, 10) === idx);
  });
  renderMessages();
}

function renderMessages() {
  if (currentIdx < 0) {
    messagesEl.innerHTML = `
      <div class="empty">
        <h2>Select a conversation</h2>
        <p>Choose one from the list on the left.</p>
      </div>`;
    return;
  }
  const c = conversations[currentIdx];

  const header = document.createElement('div');
  header.className = 'conv-header';
  header.innerHTML = `
    <h2></h2>
    <span class="conv-info"></span>
    <button class="copy-btn" id="copyConvBtn">Copy as Markdown</button>`;
  header.querySelector('h2').textContent = c.name || '(untitled)';
  header.querySelector('.conv-info').textContent =
    `${(c.chat_messages || []).length} messages · ${formatDate(c.created_at)}`;

  const registry = buildArtifactRegistry(c);

  const list = document.createElement('div');
  list.className = 'msg-list';

  const panel = renderArtifactPanel(registry);
  if (panel) list.appendChild(panel);

  (c.chat_messages || []).forEach((msg, mi) => {
    list.appendChild(renderMessage(msg, mi, { conv: c, registry }));
  });

  messagesEl.innerHTML = '';
  messagesEl.appendChild(header);
  messagesEl.appendChild(list);
  messagesEl.scrollTop = 0;

  document.getElementById('copyConvBtn').addEventListener('click', (e) => {
    copyToClipboard(conversationToMarkdown(c), e.currentTarget);
  });
}

function renderMessage(msg, mi, ctx) {
  const article = document.createElement('article');
  article.className = 'msg msg-' + (msg.sender || 'unknown');

  const head = document.createElement('header');
  head.className = 'msg-header';
  const sender = msg.sender === 'human' ? 'You' : (msg.sender === 'assistant' ? 'Claude' : msg.sender);
  head.innerHTML = `
    <span class="sender"></span>
    <span class="ts"></span>
    <button class="copy-btn">Copy</button>`;
  head.querySelector('.sender').textContent = sender;
  head.querySelector('.ts').textContent = formatDate(msg.created_at);
  head.querySelector('.copy-btn').addEventListener('click', (e) => {
    copyToClipboard(messageToMarkdown(msg), e.currentTarget);
  });

  const body = document.createElement('div');
  body.className = 'msg-body';

  const content = msg.content && msg.content.length ? msg.content : null;
  if (content) {
    content.forEach((c, ci) => {
      const el = renderContent(c, Object.assign({}, ctx, { msgIdx: mi, contentIdx: ci }));
      if (el) body.appendChild(el);
    });
  } else if (msg.text) {
    body.innerHTML = renderMarkdown(msg.text);
  }

  for (const att of (msg.attachments || [])) {
    body.appendChild(renderAttachment(att));
  }
  for (const f of (msg.files || [])) {
    const div = document.createElement('div');
    div.className = 'block';
    div.style.cssText = 'border:1px solid var(--border); border-radius:6px; padding:6px 10px; margin:8px 0; font-size:12px; color:var(--muted);';
    div.textContent = '📎 ' + (f.file_name || f.file_uuid || 'file');
    body.appendChild(div);
  }

  article.appendChild(head);
  article.appendChild(body);
  return article;
}

function renderContent(c, ctx) {
  if (!c || !c.type) return null;
  if (c.type === 'tool_use' && c.name === 'artifacts' && c.input && c.input.id) {
    return renderArtifactCard(c, ctx || {});
  }
  if (c.type === 'text') {
    const div = document.createElement('div');
    div.innerHTML = renderMarkdown(c.text || '');
    return div;
  }
  if (c.type === 'thinking') {
    return makeDetails('thinking', '💭 Thinking', renderMarkdown(c.thinking || ''), true);
  }
  if (c.type === 'tool_use') {
    const input = c.input == null ? '' :
      (typeof c.input === 'object' ? JSON.stringify(c.input, null, 2) : String(c.input));
    const pre = `<pre>${escapeHtml(input)}</pre>`;
    return makeDetails('tool-use', `🔧 Tool: ${escapeHtml(c.name || 'unknown')}`, pre, true);
  }
  if (c.type === 'tool_result') {
    let content = c.content;
    if (Array.isArray(content)) {
      content = content.map(x => x && x.text ? x.text : JSON.stringify(x)).join('\n');
    } else if (content && typeof content === 'object') {
      content = JSON.stringify(content, null, 2);
    }
    const cls = 'tool-result' + (c.is_error ? ' error' : '');
    const label = `📤 Tool result${c.is_error ? ' (error)' : ''}`;
    return makeDetails(cls, label, `<pre>${escapeHtml(content || '')}</pre>`, true);
  }
  // token_budget and other types are skipped
  return null;
}

function renderAttachment(att) {
  const name = att.file_name || `attachment.${att.file_type || 'txt'}`;
  const size = att.file_size ? ` · ${formatBytes(att.file_size)}` : '';
  const label = `📎 ${escapeHtml(name)}${size}`;
  const body = att.extracted_content
    ? `<pre>${escapeHtml(att.extracted_content)}</pre>`
    : '<em style="color:var(--muted)">No extracted content</em>';
  return makeDetails('attachment', label, body, true);
}

function makeDetails(cls, summaryHtml, bodyHtml, isHtml) {
  const d = document.createElement('details');
  d.className = 'block ' + cls;
  const s = document.createElement('summary');
  s.innerHTML = summaryHtml;
  const b = document.createElement('div');
  b.className = 'block-body';
  if (isHtml) b.innerHTML = bodyHtml;
  else b.textContent = bodyHtml;
  d.appendChild(s);
  d.appendChild(b);
  return d;
}

// ---------- Artifacts ----------

function typeLabel(t) {
  if (!t) return '?';
  const m = {
    'text/markdown': 'md',
    'text/html': 'html',
    'application/vnd.ant.react': 'react',
    'application/vnd.ant.code': 'code',
    'image/svg+xml': 'svg',
    'application/vnd.ant.mermaid': 'mermaid',
  };
  return m[t] || t.split('/').pop();
}

function artifactLang(t) {
  if (t === 'text/markdown') return 'markdown';
  if (t === 'text/html') return 'html';
  if (t === 'application/vnd.ant.react') return 'jsx';
  if (t === 'application/vnd.ant.mermaid') return 'mermaid';
  if (t === 'image/svg+xml') return 'xml';
  return '';
}

function buildArtifactRegistry(conv) {
  const map = new Map();
  (conv.chat_messages || []).forEach((msg, mi) => {
    (msg.content || []).forEach((c, ci) => {
      if (c && c.type === 'tool_use' && c.name === 'artifacts' && c.input && c.input.id) {
        const inp = c.input;
        const id = inp.id;
        let rec = map.get(id);
        if (!rec) {
          rec = { id, title: id, type: '', versions: [] };
          map.set(id, rec);
        }
        if (inp.title) rec.title = inp.title;
        if (inp.type) rec.type = inp.type;
        rec.versions.push({ msgIdx: mi, contentIdx: ci, input: inp });
      }
    });
  });
  for (const rec of map.values()) {
    let cur = null;
    for (const v of rec.versions) {
      const inp = v.input;
      if (inp.command === 'create' || inp.command === 'rewrite') {
        cur = inp.content == null ? '' : String(inp.content);
      } else if (inp.command === 'update' && cur != null && typeof inp.old_str === 'string') {
        cur = cur.split(inp.old_str).join(inp.new_str == null ? '' : String(inp.new_str));
      }
      v.resolvedContent = cur;
    }
    rec.latestContent = rec.versions.length ? rec.versions[rec.versions.length - 1].resolvedContent : null;
  }
  return map;
}

function renderArtifactPanel(registry) {
  if (!registry || registry.size === 0) return null;
  const panel = document.createElement('details');
  panel.className = 'artifacts-panel';
  panel.open = registry.size <= 3;

  const summary = document.createElement('summary');
  summary.textContent = `📦 ${registry.size} artifact${registry.size > 1 ? 's' : ''} in this conversation`;
  panel.appendChild(summary);

  const list = document.createElement('div');
  list.className = 'artifacts-list';

  for (const rec of registry.values()) {
    const item = document.createElement('div');
    item.className = 'artifacts-list-item';

    const row = document.createElement('div');
    row.className = 'art-row';
    row.innerHTML = `
      <span class="artifact-type-badge"></span>
      <span class="art-title"></span>
      <span class="art-versions-count"></span>
      <select class="art-version-select"></select>
      <button type="button" class="copy-btn art-copy">Copy</button>
      <button type="button" class="art-toggle">View</button>`;
    row.querySelector('.artifact-type-badge').textContent = typeLabel(rec.type);
    row.querySelector('.art-title').textContent = rec.title;
    row.querySelector('.art-versions-count').textContent =
      `${rec.versions.length} version${rec.versions.length > 1 ? 's' : ''}`;

    const sel = row.querySelector('.art-version-select');
    rec.versions.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = String(i);
      opt.textContent = `v${i + 1} (${v.input.command || '?'})`;
      sel.appendChild(opt);
    });
    sel.value = String(rec.versions.length - 1);

    const artBody = document.createElement('div');
    artBody.className = 'art-body';
    artBody.style.display = 'none';

    const renderAt = (i) => {
      artBody.innerHTML = '';
      const v = rec.versions[i];
      const content = v && v.resolvedContent != null ? v.resolvedContent : '';
      artBody.appendChild(renderArtifactBody(rec.type, content));
    };

    sel.addEventListener('change', () => renderAt(parseInt(sel.value, 10)));

    const toggle = row.querySelector('.art-toggle');
    toggle.addEventListener('click', () => {
      const shown = artBody.style.display !== 'none';
      if (shown) {
        artBody.style.display = 'none';
        toggle.textContent = 'View';
      } else {
        renderAt(parseInt(sel.value, 10));
        artBody.style.display = '';
        toggle.textContent = 'Hide';
      }
    });

    row.querySelector('.art-copy').addEventListener('click', (e) => {
      const i = parseInt(sel.value, 10);
      const txt = (rec.versions[i] && rec.versions[i].resolvedContent) || '';
      copyToClipboard(txt, e.currentTarget);
    });

    item.appendChild(row);
    item.appendChild(artBody);
    list.appendChild(item);
  }

  panel.appendChild(list);
  return panel;
}

function renderArtifactCard(c, ctx) {
  const inp = c.input || {};
  const cmd = inp.command || '';
  const isUpdate = cmd === 'update';

  const registry = ctx && ctx.registry;
  const rec = registry ? registry.get(inp.id) : null;
  const v = rec ? rec.versions.find(x =>
    x.msgIdx === ctx.msgIdx && x.contentIdx === ctx.contentIdx
  ) : null;

  const title = inp.title || (rec && rec.title) || inp.id || 'Artifact';
  const type = inp.type || (rec && rec.type) || '';

  const card = document.createElement('div');
  card.className = 'artifact-card' + (isUpdate ? ' artifact-update' : '');

  const head = document.createElement('div');
  head.className = 'artifact-card-header';
  head.innerHTML = `
    <span class="artifact-icon"></span>
    <span class="artifact-title"></span>
    <span class="artifact-type-badge"></span>
    <span class="artifact-cmd"></span>
    <button type="button" class="copy-btn">Copy artifact</button>`;
  head.querySelector('.artifact-icon').textContent = isUpdate ? '✏️' : '📄';
  head.querySelector('.artifact-title').textContent = isUpdate ? `Updated: ${title}` : title;
  const badge = head.querySelector('.artifact-type-badge');
  badge.textContent = typeLabel(type);
  if (!type) badge.style.display = 'none';
  head.querySelector('.artifact-cmd').textContent = cmd;
  const copyBtn = head.querySelector('.copy-btn');
  copyBtn.textContent = isUpdate ? 'Copy new version' : 'Copy artifact';
  copyBtn.addEventListener('click', (e) => {
    let txt;
    if (isUpdate) {
      txt = (v && v.resolvedContent) || inp.new_str || '';
    } else {
      txt = inp.content == null ? '' : String(inp.content);
    }
    copyToClipboard(txt, e.currentTarget);
  });
  card.appendChild(head);

  const body = document.createElement('div');
  body.className = 'artifact-content';
  if (isUpdate) {
    body.appendChild(renderArtifactDiff(inp));
  } else {
    body.appendChild(renderArtifactBody(type, inp.content == null ? '' : String(inp.content)));
  }
  card.appendChild(body);

  return card;
}

function renderArtifactBody(type, content) {
  const div = document.createElement('div');

  if (type === 'text/markdown') {
    div.className = 'artifact-rendered-md msg-body';
    div.innerHTML = renderMarkdown(content);
    return div;
  }

  if (type === 'text/html') {
    return makeArtifactPreviewSource(content, (host) => {
      const iframe = document.createElement('iframe');
      iframe.className = 'artifact-html-frame';
      iframe.setAttribute('sandbox', 'allow-scripts');
      iframe.srcdoc = content;
      host.appendChild(iframe);
    });
  }

  if (type === 'image/svg+xml') {
    return makeArtifactPreviewSource(content, (host) => {
      const wrap = document.createElement('div');
      wrap.className = 'artifact-svg-frame';
      const img = document.createElement('img');
      img.src = 'data:image/svg+xml;utf8,' + encodeURIComponent(content);
      img.alt = 'SVG artifact';
      wrap.appendChild(img);
      host.appendChild(wrap);
    });
  }

  const pre = document.createElement('pre');
  pre.className = 'artifact-source';
  const code = document.createElement('code');
  code.textContent = content;
  pre.appendChild(code);
  div.appendChild(pre);
  return div;
}

function makeArtifactPreviewSource(content, mountPreview) {
  const wrap = document.createElement('div');
  const tabs = document.createElement('div');
  tabs.className = 'artifact-tabs';
  tabs.innerHTML = `
    <button type="button" class="art-tab active" data-mode="preview">Preview</button>
    <button type="button" class="art-tab" data-mode="source">Source</button>`;
  const previewHost = document.createElement('div');
  mountPreview(previewHost);
  const pre = document.createElement('pre');
  pre.className = 'artifact-source';
  pre.style.display = 'none';
  const code = document.createElement('code');
  code.textContent = content;
  pre.appendChild(code);
  tabs.querySelectorAll('.art-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      const mode = btn.dataset.mode;
      tabs.querySelectorAll('.art-tab').forEach(b => b.classList.toggle('active', b === btn));
      previewHost.style.display = mode === 'preview' ? '' : 'none';
      pre.style.display = mode === 'source' ? '' : 'none';
    });
  });
  wrap.appendChild(tabs);
  wrap.appendChild(previewHost);
  wrap.appendChild(pre);
  return wrap;
}

function renderArtifactDiff(inp) {
  const wrap = document.createElement('div');
  wrap.className = 'artifact-diff';
  wrap.innerHTML = `
    <div class="diff-side diff-old">
      <div class="diff-label">− Replaced</div>
      <pre></pre>
    </div>
    <div class="diff-side diff-new">
      <div class="diff-label">+ With</div>
      <pre></pre>
    </div>`;
  wrap.querySelector('.diff-old pre').textContent = inp.old_str == null ? '' : String(inp.old_str);
  wrap.querySelector('.diff-new pre').textContent = inp.new_str == null ? '' : String(inp.new_str);
  return wrap;
}

function artifactToMarkdown(inp) {
  const title = inp.title || inp.id || 'artifact';
  if (inp.command === 'update') {
    const oldS = inp.old_str == null ? '' : String(inp.old_str);
    const newS = inp.new_str == null ? '' : String(inp.new_str);
    return `**✏️ Updated artifact: ${title}**\n\nReplaced:\n\n\`\`\`\n${oldS}\n\`\`\`\n\nWith:\n\n\`\`\`\n${newS}\n\`\`\``;
  }
  const lang = artifactLang(inp.type);
  const content = inp.content == null ? '' : String(inp.content);
  const meta = `${inp.type || 'unknown'} · ${inp.command || 'create'}`;
  return `**📄 Artifact: ${title}** _(${meta})_\n\n\`\`\`${lang}\n${content}\n\`\`\``;
}

// ---------- /Artifacts ----------

function renderMarkdown(text) {
  if (!text) return '';
  try {
    return window.marked ? marked.parse(text) : `<p>${escapeHtml(text).replace(/\n/g, '<br>')}</p>`;
  } catch (e) {
    return `<p>${escapeHtml(text)}</p>`;
  }
}

function messageToMarkdown(msg) {
  const role = msg.sender === 'human' ? 'User' : msg.sender === 'assistant' ? 'Assistant' : (msg.sender || 'Unknown');
  const parts = [];
  const content = msg.content && msg.content.length ? msg.content : null;
  if (content) {
    for (const c of content) {
      if (c.type === 'text') {
        parts.push(c.text || '');
      } else if (c.type === 'thinking') {
        parts.push(`> **Thinking**\n>\n> ${(c.thinking || '').replace(/\n/g, '\n> ')}`);
      } else if (c.type === 'tool_use' && c.name === 'artifacts' && c.input && c.input.id) {
        parts.push(artifactToMarkdown(c.input));
      } else if (c.type === 'tool_use') {
        const input = c.input == null ? '' :
          (typeof c.input === 'object' ? JSON.stringify(c.input, null, 2) : String(c.input));
        parts.push(`**Tool call: \`${c.name || 'unknown'}\`**\n\n\`\`\`json\n${input}\n\`\`\``);
      } else if (c.type === 'tool_result') {
        let inner = c.content;
        if (Array.isArray(inner)) inner = inner.map(x => x && x.text ? x.text : JSON.stringify(x)).join('\n');
        else if (inner && typeof inner === 'object') inner = JSON.stringify(inner, null, 2);
        parts.push(`**Tool result${c.is_error ? ' (error)' : ''}**\n\n\`\`\`\n${inner || ''}\n\`\`\``);
      }
    }
  } else if (msg.text) {
    parts.push(msg.text);
  }
  for (const att of (msg.attachments || [])) {
    const name = att.file_name || `attachment.${att.file_type || 'txt'}`;
    parts.push(`**📎 ${name}**\n\n\`\`\`\n${att.extracted_content || ''}\n\`\`\``);
  }
  return `**${role}:**\n\n${parts.join('\n\n').trim()}`;
}

function conversationToMarkdown(c) {
  const lines = [];
  lines.push(`# ${c.name || '(untitled)'}`);
  lines.push('');
  lines.push(`*Created: ${formatDate(c.created_at)} · Updated: ${formatDate(c.updated_at)}*`);
  lines.push('');
  for (const msg of (c.chat_messages || [])) {
    lines.push(messageToMarkdown(msg));
    lines.push('');
    lines.push('---');
    lines.push('');
  }
  return lines.join('\n');
}

async function copyToClipboard(text, btn) {
  const original = btn.textContent;
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = '✓ Copied';
    btn.classList.add('copied');
  } catch (e) {
    // Fallback for older browsers / non-secure contexts
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.top = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); btn.textContent = '✓ Copied'; btn.classList.add('copied'); }
    catch (err) { btn.textContent = 'Copy failed'; }
    document.body.removeChild(ta);
  }
  setTimeout(() => {
    btn.textContent = original;
    btn.classList.remove('copied');
  }, 1500);
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function formatDate(s) {
  if (!s) return '';
  const d = new Date(s);
  if (isNaN(d)) return s;
  return d.toLocaleString(undefined, {
    year: 'numeric', month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

function formatBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
  return (n / 1024 / 1024).toFixed(1) + ' MB';
}
